name: Render Keep Alive Production

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Execute Health Check Request
        # ${{ secrets.RENDER_HEALTH_CHECK_URL }}을 통해 실제 주소를 숨기고 안전하게 주입합니다.
        run: |
          curl -f -s -S -m 10 \
          -A "GitHubActions-KeepAlive-Bot/1.0" \
          ${{ secrets.RENDER_HEALTH_CHECK_URL }}