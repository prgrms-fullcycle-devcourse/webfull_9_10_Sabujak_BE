services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    env_file:
      - .env
    command: npm run dev 
    volumes:
      - ./:/app
      - /app/node_modules 
    networks:
      - sabujak_net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sabujak_net
    # Healthcheck: DB가 정상적으로 핑을 응답하는지 주기적으로 검증
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  sabujak_net:
    driver: bridge

volumes:
  postgres_data: